name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Setup Java
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Build using Maven
    - name: Build with Maven
      run: mvn clean package

    # 4. Copy WAR to server
    - name: Copy WAR to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: ${{ secrets.PORT }}
        source: "target/*.war"
        target: "/tmp/"

    # 5. Deploy to Tomcat (DO NOT STOP PIPELINE)
    - name: Deploy to Tomcat
      continue-on-error: true
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: ${{ secrets.PORT }}
        script: |
          sudo mkdir -p /opt/tomcat9/webapps/
          sudo cp /tmp/*.war /opt/tomcat9/webapps/ || true
          sudo systemctl restart tomcat9 || true

    # 6. IMPORTANT: Invoke Jenkins Job (YOUR REQUIRED OUTPUT)
    - name: Invoke Jenkins Deployment Job
      uses: appleboy/jenkins-action@master
      with:
        url: ${{ secrets.JENKINS_URL }}
        user: ${{ secrets.JENKINS_USER }}
        token: ${{ secrets.JENKINS_TOKEN }}
        job: Test_GitHubActions_job
